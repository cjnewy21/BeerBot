<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#091029">
  <meta name="robots" content="noindex,nofollow">
  <title>Bartender Bot — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header class="site-header">
    <img class="brand-logo" src="assets/logo.png" alt="Mechatronic Solutions">
  </header>

  <main>
    <span class="station-eyebrow">Admin</span>
    <h1>Station QR codes</h1>
    <p class="subtitle">
      Print one QR per station. Customers who scan land directly on
      that station's order page. Add or remove stations in
      <code>assets/config.js</code>.
    </p>

    <div class="config-warning" id="config-warning" style="display:none"></div>

    <div class="station-grid" id="station-grid"></div>
  </main>

  <footer class="site-footer">
    Admin only — do not share this URL with customers
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/admin.js"></script>
</body>
</html>
