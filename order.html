<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#091029">
  <meta name="robots" content="noindex,nofollow">
  <title>Order a drink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header class="site-header">
    <img class="brand-logo" src="assets/logo.png" alt="Mechatronic Solutions">
  </header>

  <main>
    <span class="station-eyebrow" id="station-tag">--</span>
    <h1>What can the robot pour you?</h1>
    <p class="subtitle">Tap a drink to order. Your drink will be delivered to <strong id="station-name">your station</strong>. Check the screen to see the current order queue.</p>

    <ul class="drink-list" id="drink-list"></ul>

    <div class="status" id="status" style="display:none"></div>
  </main>

  <footer class="site-footer">
    Powered by Mechatronic Solutions
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
